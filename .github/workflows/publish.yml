name: Publish Extension

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' public/manifest.json > tmp.json && mv tmp.json public/manifest.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - run: pnpm build

      - name: Zip
        run: cd dist && zip -r ../extension.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip

  publish-chrome:
    if: false
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Upload & Publish
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true

  publish-edge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Upload package
        id: upload
        env:
          EDGE_API: https://api.addons.microsoftedge.microsoft.com
        run: |
          RESPONSE=$(curl -s -D - -X POST \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/zip" \
            -T extension.zip \
            "$EDGE_API/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions/draft/package")
          OPERATION_ID=$(echo "$RESPONSE" | grep -i '^location:' | tr -d '\r' | awk '{print $2}')
          echo "operation_id=$OPERATION_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for upload to complete
        env:
          EDGE_API: https://api.addons.microsoftedge.microsoft.com
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s \
              -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
              -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
              "$EDGE_API/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions/draft/package/operations/${{ steps.upload.outputs.operation_id }}" \
              | jq -r '.status')
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "Succeeded" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ]; then echo "Upload failed"; exit 1; fi
            sleep 5
          done
          echo "Timed out waiting for upload"
          exit 1

      - name: Publish
        env:
          EDGE_API: https://api.addons.microsoftedge.microsoft.com
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          NOTES=$(echo "$RELEASE_NOTES" | head -c 1900)
          jq -n --arg notes "$NOTES" '{notes: $notes}' | \
          curl -f -X POST \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/json" \
            -d @- \
            "$EDGE_API/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions"
