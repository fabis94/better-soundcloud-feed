name: Publish Extension

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' public/manifest.json > tmp.json && mv tmp.json public/manifest.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - run: pnpm build

      - name: Zip
        run: cd dist && zip -r ../extension.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip

  publish-chrome:
    needs: build
    runs-on: ubuntu-latest
    env:
      CHROME_API: https://chromewebstore.googleapis.com
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Get access token
        id: auth
        run: |
          TOKEN=$(curl -s "https://oauth2.googleapis.com/token" \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" | jq -r '.access_token')
          echo "access_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload package
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -T extension.zip \
            "$CHROME_API/upload/v2/publishers/${{ secrets.CHROME_PUBLISHER_ID }}/items/${{ secrets.CHROME_EXTENSION_ID }}:upload")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then echo "HTTP $HTTP_CODE"; exit 1; fi

      - name: Publish
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "$CHROME_API/v2/publishers/${{ secrets.CHROME_PUBLISHER_ID }}/items/${{ secrets.CHROME_EXTENSION_ID }}:publish")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then echo "HTTP $HTTP_CODE"; exit 1; fi

  publish-firefox:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Unzip
        run: mkdir dist && cd dist && unzip ../extension.zip

      - name: Submit to AMO
        run: |
          npx web-ext sign \
            --channel listed \
            --source-dir dist \
            --api-key "${{ secrets.AMO_API_KEY }}" \
            --api-secret "${{ secrets.AMO_API_SECRET }}" \
            --approval-timeout 0

  publish-edge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Upload package
        id: upload
        env:
          EDGE_API: https://api.addons.microsoftedge.microsoft.com
        run: |
          RESPONSE=$(curl -s -D - -X POST \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/zip" \
            -T extension.zip \
            "$EDGE_API/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions/draft/package")
          echo "$RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | head -1 | grep -oP '\d{3}')
          OPERATION_ID=$(echo "$RESPONSE" | grep -i '^location:' | tr -d '\r' | awk '{print $2}')
          echo "operation_id=$OPERATION_ID" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" -ge 400 ]; then echo "HTTP $HTTP_CODE"; exit 1; fi

      - name: Wait for upload to complete
        env:
          EDGE_API: https://api.addons.microsoftedge.microsoft.com
        run: |
          for i in $(seq 1 30); do
            BODY=$(curl -s \
              -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
              -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
              "$EDGE_API/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions/draft/package/operations/${{ steps.upload.outputs.operation_id }}")
            STATUS=$(echo "$BODY" | jq -r '.status')
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "Succeeded" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ]; then echo "$BODY" | jq .; exit 1; fi
            sleep 5
          done
          echo "Timed out waiting for upload"
          exit 1

      - name: Publish
        env:
          EDGE_API: https://api.addons.microsoftedge.microsoft.com
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          NOTES=$(echo "$RELEASE_NOTES" | head -c 1900)
          RESPONSE=$(jq -n --arg notes "$NOTES" '{notes: $notes}' | \
          curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: ApiKey ${{ secrets.EDGE_API_KEY }}" \
            -H "X-ClientID: ${{ secrets.EDGE_CLIENT_ID }}" \
            -H "Content-Type: application/json" \
            -d @- \
            "$EDGE_API/v1/products/${{ secrets.EDGE_PRODUCT_ID }}/submissions")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then echo "HTTP $HTTP_CODE"; exit 1; fi
