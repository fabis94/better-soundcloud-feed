<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#e04400"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Sound waveform bars clipped by funnel shape -->
  <defs>
    <clipPath id="funnel">
      <polygon points="20,30 108,30 78,75 78,105 50,105 50,75"/>
    </clipPath>
  </defs>
  <g clip-path="url(#funnel)">
    <rect x="24" y="20" width="6" height="90" rx="3" fill="white" opacity="0.95"/>
    <rect x="36" y="10" width="6" height="100" rx="3" fill="white" opacity="0.95"/>
    <rect x="48" y="25" width="6" height="85" rx="3" fill="white" opacity="0.95"/>
    <rect x="60" y="15" width="6" height="95" rx="3" fill="white" opacity="0.95"/>
    <rect x="72" y="30" width="6" height="80" rx="3" fill="white" opacity="0.95"/>
    <rect x="84" y="20" width="6" height="90" rx="3" fill="white" opacity="0.95"/>
    <rect x="96" y="28" width="6" height="82" rx="3" fill="white" opacity="0.95"/>
  </g>
</svg>
